x-mongo-healthcheck: &mongo-healthcheck
  test: ["CMD-SHELL", "mongosh --quiet --eval 'quit(db.adminCommand(\"ping\").ok ? 0 : 1)'"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 15s

x-auth-service: &auth-service
  build: ./services/auth-service
  depends_on:
    postgres:
      condition: service_healthy
      restart: true
    redis:
      condition: service_healthy
      restart: true
  env_file: .env

x-pipeline-service-deps: &pipeline-service-deps
  kafka-init:
    condition: service_completed_successfully
  mongo-init:
    condition: service_completed_successfully
  mongo1:
    condition: service_healthy
  mongo2:
    condition: service_healthy
  mongo3:
    condition: service_healthy

services:

  # ── Infrastructure ──────────────────────────────────────────────

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg=="
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./infra/kafka/topics.sh:/scripts/topics.sh:ro
    entrypoint: ["bash", "/scripts/topics.sh"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo1:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1-data:/data/db
    healthcheck: *mongo-healthcheck

  mongo2:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo2-data:/data/db
    healthcheck: *mongo-healthcheck

  mongo3:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo3-data:/data/db
    healthcheck: *mongo-healthcheck

  mongo-init:
    image: mongo:7
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./infra/mongo/init-replica.js:/scripts/init-replica.js:ro
    entrypoint: ["mongosh", "--host", "mongo1:27017", "/scripts/init-replica.js"]

  elasticsearch:
    image: elasticsearch:8.13.0
    profiles: ["future"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  # ── Services ────────────────────────────────────────────────────

  api-gateway:
    build: ./services/api-gateway
    restart: on-failure
    ports:
      - "8080:8000"
    depends_on:
      auth-lb:
        condition: service_started
      feed-service:
        condition: service_started
      redis:
        condition: service_healthy
    env_file: .env

  auth-service-1:
    <<: *auth-service

  auth-service-2:
    <<: *auth-service

  auth-lb:
    image: nginx:1.27-alpine
    depends_on: [auth-service-1, auth-service-2]
    ports:
      - "8081:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  ingestion-service:
    build: ./services/ingestion-service
    restart: on-failure
    depends_on: *pipeline-service-deps
    env_file: .env

  processing-service:
    build: ./services/processing-service
    restart: on-failure
    depends_on: *pipeline-service-deps
    env_file: .env

  feed-service:
    build: ./services/feed-service
    restart: on-failure
    depends_on: *pipeline-service-deps
    env_file: .env

  llm-service:
    build: ./services/llm-service
    profiles: ["future"]
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env

volumes:
  kafka-data:
  postgres-data:
  redis-data:
  mongo1-data:
  mongo2-data:
  mongo3-data:
  es-data:
